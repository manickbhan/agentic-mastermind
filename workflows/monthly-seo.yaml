# Workflow Template: Monthly SEO Maintenance
# Run this every month for existing clients.
# Copy to plans/clients/{client-slug}/{YYYY-MM}.yaml and fill in the variables.

template: monthly-seo
version: "1.0"
description: "Monthly SEO cycle — suggestions, schema, indexing, content expansion, grading"

# ── Client Info ───────────────────────────────────────────────────────────────
client: ""
domain: ""
period: ""                          # e.g. "2026-02"
status: pending

# ── IDs (required — from previous onboarding) ─────────────────────────────────
ids:
  otto_project_id: ""               # REQUIRED
  brand_vault_id: ""                # REQUIRED for content generation
  topical_map_id: ""                # leave blank to create new one this month

# ── Configuration ─────────────────────────────────────────────────────────────
config:
  monthly_keyword: ""               # new/expanded topical keyword this month
  pillar_url: ""                    # page to expand from
  articles_to_generate: 4
  articles_to_grade: 5              # existing articles to run content grader on

# ── Steps ─────────────────────────────────────────────────────────────────────
steps:
  - id: 1
    name: "Get issues overview"
    tool: OTTO_Project_Management
    operations:
      - op: get_otto_project_details
        params:
          project_id: "{{ids.otto_project_id}}"
      - op: manual_reprocess_autopilot
        params:
          project_id: "{{ids.otto_project_id}}"
    status: pending

  - id: 2
    name: "Review + apply OTTO suggestions"
    tool: OTTO_Suggestion_Management
    operations:
      - op: edit_suggestions_bulk
        params:
          project_id: "{{ids.otto_project_id}}"
          action: apply_all_approved
    status: pending
    depends_on: [1]

  - id: 3
    name: "Generate + deploy pending schemas"
    tool: OTTO_Schema_Markup
    operations:
      - op: list_domain_level_schemas
        params:
          project_id: "{{ids.otto_project_id}}"
      - op: deploy_domain_level_schema
        params:
          project_id: "{{ids.otto_project_id}}"
    status: pending
    depends_on: [1]

  - id: 4
    name: "Check + fix indexing issues"
    tool: OTTO_Indexing_Management
    operations:
      - op: get_indexing_sitemaps
        params:
          project_id: "{{ids.otto_project_id}}"
      - op: get_custom_indexing_urls
        params:
          project_id: "{{ids.otto_project_id}}"
      - op: select_urls_for_indexing
        params:
          project_id: "{{ids.otto_project_id}}"
    status: pending
    depends_on: [1]

  - id: 5
    name: "Create / expand topical map"
    tool: Topical_Maps_Tools
    operations:
      - op: create_topical_map
        params:
          keyword: "{{config.monthly_keyword}}"
          domain: "{{domain}}"
          pillar_url: "{{config.pillar_url}}"
    output_key: ids.topical_map_id
    output: article_titles
    status: pending

  - id: 6
    name: "Generate articles from topical map"
    tool: Content_Generation_Tool
    description: "4-step workflow per article"
    operations:
      - op: create_content_instance
        params:
          topical_map_id: "{{ids.topical_map_id}}"
          brand_vault_id: "{{ids.brand_vault_id}}"
      - op: start_information_retrieval
      - op: poll_information_retrieval
      - op: start_headings_outline
      - op: poll_headings_outline
      - op: generate_complete_article
    repeat: "{{config.articles_to_generate}}"
    output: article_editor_links
    status: pending
    depends_on: [5]

  - id: 7
    name: "Run content grader on existing articles"
    tool: Article_Management_Tools
    operations:
      - op: list_recent_articles
        params:
          domain: "{{domain}}"
          limit: "{{config.articles_to_grade}}"
      - op: run_content_grader
        params:
          article_id: "{{article_id}}"    # iterate
    repeat: "{{config.articles_to_grade}}"
    output: grader_scores
    status: pending

# ── Results ───────────────────────────────────────────────────────────────────
results: []

# ── Output Summary Template ────────────────────────────────────────────────────
# ✅  {client} — {period} Monthly SEO
#
# 🔧  Suggestions     {N} applied automatically               View →
# 📋  Schema          {N} schemas deployed                     View →
# 🔗  Indexing        {N} URLs submitted                       View →
# 🗺️  Topical Map     {N} new article ideas                   View →
# ✍️  Content         {N} articles created · avg score {X}    View →
# 📊  Content Grader  {N} articles graded                      View →
#
# {total} actions completed · {failed} failed
